<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連続時計 - 時計管制系統</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="timer.css">
</head>
<body>
    <header class="eva-header">
        <div class="logo">
            連続時計
            <span class="sub">順次運用機能</span>
        </div>
        <div class="status-bar">
            <span class="status-indicator"></span>
            <span id="clock">00:00:00</span>
            <a href="index.html" class="nav-link">一覧</a>
        </div>
    </header>

    <div class="eva-container">
        <div class="two-column">
            <!-- 左: タイマー表示 -->
            <div class="col-main">
                <!-- 全体ステータス -->
                <div class="eva-panel">
                    <div class="panel-header">
                        <span class="panel-title">現在の運用状況</span>
                        <span class="panel-id" id="seqStatus">待機</span>
                    </div>
                    <div class="panel-body">
                        <div id="currentStepTitle" style="text-align:center;font-family:var(--font-display);font-size:1.2rem;color:var(--eva-orange);letter-spacing:2px;margin-bottom:8px;">
                            --- 順序待機中 ---
                        </div>
                        <div class="timer-display" id="mainDisplay">00:00:00</div>
                        <div class="progress-container">
                            <div class="progress-bar" id="mainProgress"></div>
                        </div>
                        <div style="text-align:center;margin-top:8px;font-size:0.75rem;color:var(--eva-text-dim);">
                            步 <span id="currentStepNum">0</span> / <span id="totalSteps">0</span>
                            &nbsp;&mdash;&nbsp; 全体残り: <span id="totalRemaining">00:00:00</span>
                        </div>
                        <div class="btn-group" style="justify-content:center;">
                            <button class="eva-btn btn-start" onclick="startSequence()">開始</button>
                            <button class="eva-btn btn-stop" onclick="stopSequence()">停止</button>
                            <button class="eva-btn btn-reset" onclick="resetSequence()">初期化</button>
                            <button class="eva-btn btn-orange" onclick="skipStep()">飛越 ▶▶</button>
                        </div>
                        <div style="text-align:center;margin-top:10px;">
                            <div class="mute-toggle" id="globalMute" onclick="toggleGlobalMute()" style="display:inline-flex;">
                                <span class="mute-icon">🔊</span>
                                <span>音声</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ステップリスト -->
                <div class="eva-panel">
                    <div class="panel-header">
                        <span class="panel-title">工程一覧</span>
                        <span class="panel-id">待ち行列</span>
                    </div>
                    <div class="panel-body">
                        <div id="stepList"></div>
                    </div>
                </div>
            </div>

            <!-- 右: 登録フォーム -->
            <div class="col-side">
                <div class="eva-panel">
                    <div class="panel-header">
                        <span class="panel-title">工程登録</span>
                        <span class="panel-id">登録</span>
                    </div>
                    <div class="panel-body">
                        <div class="eva-input-group">
                            <label>名称</label>
                            <input type="text" id="newTitle" class="eva-input eva-input-title" placeholder="工程名を入力">
                        </div>
                        <div class="eva-input-group">
                            <label>時間</label>
                            <input type="text" id="newHours" class="eva-input eva-input-sm" inputmode="numeric" pattern="[0-9]*" maxlength="2" value="0" placeholder="H">
                            <span style="color:var(--eva-orange)">:</span>
                            <input type="text" id="newMinutes" class="eva-input eva-input-sm" inputmode="numeric" pattern="[0-9]*" maxlength="2" value="5" placeholder="M">
                            <span style="color:var(--eva-orange)">:</span>
                            <input type="text" id="newSeconds" class="eva-input eva-input-sm" inputmode="numeric" pattern="[0-9]*" maxlength="2" value="0" placeholder="S">
                        </div>
                        <div class="sound-select-group">
                            <label>終了音</label>
                            <div class="sound-select-row">
                                <select id="newSoundType" class="eva-select" onchange="onSoundTypeChange()">
                                    <option value="pi">ぴ（単音）</option>
                                    <option value="pipi">ぴぴ（二連）</option>
                                    <option value="pii">ぴー（長音）</option>
                                    <option value="custom">独自音声</option>
                                </select>
                                <button class="eva-btn btn-preview" type="button" onclick="previewSound()">試聴</button>
                            </div>
                            <div id="fileUploadArea" style="display:none;margin-top:6px;">
                                <label class="sound-file-label">
                                    音声選択 (WAV/MP3)
                                    <input type="file" id="soundFile" accept=".wav,.mp3,audio/wav,audio/mpeg" onchange="onSoundFileSelected(this)">
                                </label>
                                <div class="sound-file-name" id="soundFileName"></div>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="eva-btn btn-add" onclick="addStep()" style="width:100%;">工程追加</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="eva-footer">
        連続時計系統 &mdash; 連鎖運用稼働中
    </footer>

    <script src="timer.js"></script>
    <script>
        startClock('clock');

        const steps = [];
        const sound = new SoundManager();
        let currentStepIndex = -1;
        let activeTimer = null;
        let sequenceRunning = false;

        function onSoundTypeChange() {
            const type = document.getElementById('newSoundType').value;
            document.getElementById('fileUploadArea').style.display = type === 'custom' ? 'block' : 'none';
        }

        function onSoundFileSelected(input) {
            if (input.files.length > 0) {
                sound.loadCustomFile(input.files[0]);
                document.getElementById('soundFileName').textContent = input.files[0].name;
            }
        }

        function previewSound() {
            const type = document.getElementById('newSoundType').value;
            if (type !== 'custom') sound.setSoundType(type);
            sound.preview();
        }

        function applySoundType() {
            const type = document.getElementById('newSoundType').value;
            if (type !== 'custom') sound.setSoundType(type);
        }

        function addStep() {
            const title = document.getElementById('newTitle').value || `工程 ${String(steps.length + 1).padStart(2, '0')}`;
            const h = parseInt(document.getElementById('newHours').value) || 0;
            const m = parseInt(document.getElementById('newMinutes').value) || 0;
            const s = parseInt(document.getElementById('newSeconds').value) || 0;
            const totalSec = h * 3600 + m * 60 + s;

            if (totalSec <= 0) return;

            steps.push({ title, totalSeconds: totalSec, completed: false });
            document.getElementById('newTitle').value = '';
            renderStepList();
            updateTotalInfo();
        }

        function removeStep(index) {
            if (sequenceRunning) return;
            steps.splice(index, 1);
            renderStepList();
            updateTotalInfo();
        }

        function renderStepList() {
            const container = document.getElementById('stepList');
            container.innerHTML = '';
            steps.forEach((step, i) => {
                const div = document.createElement('div');
                div.className = 'timer-card' + (i === currentStepIndex ? ' active' : '') + (step.completed ? ' completed-card' : '');
                div.innerHTML = `
                    <div class="timer-card-header">
                        <span class="panel-title">${escapeHtml(step.title)}</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="panel-id">#${String(i + 1).padStart(2, '0')}</span>
                            <span style="font-size:0.7rem;color:var(--eva-green);">${formatTimeAlwaysFull(step.totalSeconds)}</span>
                            ${!sequenceRunning ? `<button class="eva-btn btn-remove" onclick="removeStep(${i})">削除</button>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('totalSteps').textContent = steps.length;
        }

        function updateTotalInfo() {
            let totalRemain = 0;
            steps.forEach((step, i) => {
                if (i > currentStepIndex || currentStepIndex === -1) {
                    totalRemain += step.totalSeconds;
                }
            });
            if (activeTimer && currentStepIndex >= 0) {
                totalRemain = activeTimer.remainingSeconds;
                for (let i = currentStepIndex + 1; i < steps.length; i++) {
                    totalRemain += steps[i].totalSeconds;
                }
            }
            document.getElementById('totalRemaining').textContent = formatTimeAlwaysFull(totalRemain);
        }

        function startSequence() {
            if (steps.length === 0) return;
            if (sequenceRunning && activeTimer && !activeTimer.running) {
                activeTimer.start();
                return;
            }
            if (sequenceRunning) return;
            applySoundType();
            sequenceRunning = true;
            currentStepIndex = -1;
            steps.forEach(s => s.completed = false);
            runNextStep();
        }

        function runNextStep() {
            currentStepIndex++;
            if (currentStepIndex >= steps.length) {
                finishSequence();
                return;
            }

            const step = steps[currentStepIndex];
            document.getElementById('currentStepTitle').textContent = step.title;
            document.getElementById('currentStepNum').textContent = currentStepIndex + 1;
            document.getElementById('seqStatus').textContent = '実行中';

            const displayEl = document.getElementById('mainDisplay');
            const progressEl = document.getElementById('mainProgress');

            activeTimer = new TimerCore({
                onTick(remaining, total) {
                    displayEl.textContent = formatTimeAlwaysFull(remaining);
                    updateTimerDisplayClass(displayEl, remaining, total);
                    updateProgressBar(progressEl, remaining, total);
                    updateTotalInfo();
                },
                onFinish() {
                    step.completed = true;
                    sound.playAlarm();
                    renderStepList();
                    setTimeout(() => runNextStep(), 1500);
                },
                onStart() {
                    renderStepList();
                },
                onStop() {},
                onReset() {}
            });

            activeTimer.setTime(0, 0, step.totalSeconds);
            displayEl.textContent = formatTimeAlwaysFull(step.totalSeconds);
            displayEl.classList.remove('warning', 'danger', 'finished');
            progressEl.style.width = '100%';
            progressEl.classList.remove('warning', 'danger');
            renderStepList();
            activeTimer.start();
        }

        function finishSequence() {
            sequenceRunning = false;
            activeTimer = null;
            currentStepIndex = -1;
            document.getElementById('currentStepTitle').textContent = '--- 順序完了 ---';
            document.getElementById('seqStatus').textContent = '完了';
            document.getElementById('currentStepNum').textContent = '0';
            sound.playAlarm();
            renderStepList();
        }

        function stopSequence() {
            if (activeTimer) activeTimer.stop();
            document.getElementById('seqStatus').textContent = '一時停止';
        }

        function resetSequence() {
            if (activeTimer) activeTimer.stop();
            activeTimer = null;
            sequenceRunning = false;
            currentStepIndex = -1;
            steps.forEach(s => s.completed = false);

            document.getElementById('mainDisplay').textContent = '00:00:00';
            document.getElementById('mainDisplay').classList.remove('warning', 'danger', 'finished');
            document.getElementById('mainProgress').style.width = '100%';
            document.getElementById('mainProgress').classList.remove('warning', 'danger');
            document.getElementById('currentStepTitle').textContent = '--- 順序待機中 ---';
            document.getElementById('seqStatus').textContent = '待機';
            document.getElementById('currentStepNum').textContent = '0';
            renderStepList();
            updateTotalInfo();
        }

        function skipStep() {
            if (!sequenceRunning || !activeTimer) return;
            activeTimer.stop();
            steps[currentStepIndex].completed = true;
            renderStepList();
            runNextStep();
        }

        function toggleGlobalMute() {
            const muted = sound.toggleMute();
            const el = document.getElementById('globalMute');
            if (muted) {
                el.classList.add('muted');
                el.querySelector('.mute-icon').textContent = '🔇';
                el.querySelector('span:last-child').textContent = '消音';
            } else {
                el.classList.remove('muted');
                el.querySelector('.mute-icon').textContent = '🔊';
                el.querySelector('span:last-child').textContent = '音声';
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
